apiVersion: v1
kind: Secret
type: Opaque
metadata:
  name: {{ include "buildbuddy.fullname" . }}-config
  labels:
    app.kubernetes.io/name: {{ include "buildbuddy.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    helm.sh/chart: {{ include "buildbuddy.chart" . }}
data:
  {{- /* Make a deep copy of the default config */}}
  {{- $c := deepCopy .Values.config }}

  {{- /* Set cache_proxy.remote_cache to the value of .Values.cacheTarget. */}}
  {{- $remoteCache := .Values.cacheTarget }}
  {{- if not $c.cache_proxy }}
  {{- $_ := set $c "cache_proxy" dict }}
  {{- end }}
  {{- $_ := set $c.cache_proxy "remote_cache" $remoteCache }}

  {{- /* Set cache_proxy.remote_hit_tracker to cache_proxy.remote_cache. */}}
  {{- $_ := set $c.cache_proxy "remote_hit_tracker" (dict "target" $remoteCache) }}

  {{- /* Set auth.remote.target to cache_proxy.remote_cache. */}}
  {{- if not $c.auth }}
  {{- $_ := set $c "auth" dict }}
  {{- end }}
  {{- if not $c.auth.remote }}
  {{- $_ := set $c.auth "remote" dict }}
  {{- end }}
  {{- $_ := set $c.auth.remote "target" $remoteCache }}

  {{- /* Render the processed config as an encoded YAML string. */}}
  {{- /* NOTE: Mounted at /config.yaml on the cache-proxy pod */}}
  config.yaml: {{ $c | toYaml | b64enc }}
